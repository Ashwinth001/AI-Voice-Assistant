<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ASTRA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); }
        .glow { box-shadow: 0 0 60px rgba(56, 189, 248, 0.3); }
        .card-glow { box-shadow: 0 0 30px rgba(56, 189, 248, 0.15); }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white flex items-center justify-center">
    <div class="w-full max-w-md mx-4">
        <div class="text-center mb-8">
            <a href="/" class="inline-flex items-center space-x-2">
                <div class="w-12 h-12 bg-cyan-500 rounded-full flex items-center justify-center glow">
                    <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M10 2a8 8 0 100 16 8 8 0 000-16zM8 12a1 1 0 11-2 0 1 1 0 012 0zm6 0a1 1 0 11-2 0 1 1 0 012 0z"/>
                    </svg>
                </div>
                <span class="text-3xl font-bold text-cyan-400">ASTRA</span>
            </a>
        </div>

        <div class="bg-slate-800/50 rounded-2xl p-8 card-glow">
            <h1 class="text-2xl font-bold text-center mb-2">Welcome Back</h1>
            <p class="text-gray-400 text-center mb-8">Login to your AI assistant</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="mb-6">
                {% for category, message in messages %}
                <div class="p-4 rounded-lg {% if category == 'error' %}bg-red-500/20 border border-red-500{% elif category == 'success' %}bg-green-500/20 border border-green-500{% else %}bg-blue-500/20 border border-blue-500{% endif %}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Email Address</label>
                    <input type="email" name="email" required 
                           class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600 rounded-xl focus:border-cyan-500 focus:outline-none transition"
                           placeholder="your@email.com">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Password</label>
                    <input type="password" name="password" required 
                           class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600 rounded-xl focus:border-cyan-500 focus:outline-none transition"
                           placeholder="••••••••">
                </div>
                <button type="submit" 
                        class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 py-3 rounded-xl font-semibold transition transform hover:scale-[1.02]">
                    Login
                </button>
            </form>

            <p class="text-gray-500 text-center mt-6">
                Don't have an account? <a href="/register" class="text-cyan-400 hover:text-cyan-300">Create one</a>
            </p>
        </div>
    </div>
</body>
</html>
