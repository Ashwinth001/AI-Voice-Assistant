# ASTRA Configuration
# ====================
# Advanced Self-Training Reasoning Assistant
# This file is auto-generated by the setup wizard.
# All values are configured dynamically - no hardcoding.
# To change settings, use the SETTINGS tab in the app.

app:
  name: "ASTRA"           # App name (fixed) - Advanced Self-Training Reasoning Assistant
  version: "2.0.0"
  ai_name: ""              # Set by user during setup (e.g., "Nova", "Alex", "Friday")
  wake_word: ""            # Auto-set from ai_name
  user_name: ""            # Set by user during setup
  user_id: ""              # Auto-generated
  creator: "Ashwinth"      # Creator name (fixed)
  theme: "holographic"     # Set by user during setup
  wake_mode: "always"

voice:
  stt_model: "base.en"
  stt_device: "cpu"
  language: "en"
  vad_aggressiveness: 2
  silence_threshold_ms: 800
  noise_cancel: false
  voice_auth_enabled: false

tts:
  engine: "piper"
  voice_gender: ""           # Set by user: female / male
  voice_tone: ""             # Set by user: soft / medium / strong
  piper_voice: ""            # Auto-set from gender + tone selection
  piper_length_scale: 1.0    # Auto-set from tone selection
  filler_sounds: true

llm:
  provider: "groq"
  model: "llama-3.3-70b-versatile"
  fallback_model: "phi3.5"
  num_gpu: 0
  num_predict: 120
  temperature: 0.7
  num_ctx: 2048
  stream: true
  humor: true
  personality: ""          # Auto-generated from ai_name, user_name, creator

memory:
  chroma_path: "./data/chroma"
  top_k_results: 3
  auto_learn: true

training:
  enabled: true
  data_path: "./data/training"
  min_quality: 0.7
  min_turns: 30
  provider: "kaggle"
  schedule_days: 2
  schedule_time: "02:00"
  epochs: 2
  batch_size: 2

cloud:
  provider: "local"
  sync_enabled: false

agentic:
  code_output_dir: ""      # Set during setup (user's home + /ASTRAProjects)
  editor: "code"

media:
  pictures_folder: ""      # Set during setup
  videos_folder: ""        # Set during setup
  screenshots_folder: ""   # Set during setup

ui:
  window_width: 600
  window_height: 900
  always_on_top: false
  opacity: 0.97
  show_metrics: true
  hotkey: "ctrl+shift+a"
